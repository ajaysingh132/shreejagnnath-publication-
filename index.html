<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jagannath Publishing Pro</title>

<style>
body{font-family:sans-serif;margin:0;background:#fff7e6}
.header{background:#ff8c00;color:#fff;padding:15px;text-align:center;font-size:20px}
.container{padding:10px}
.card{background:#fff;padding:10px;margin:10px;border-radius:10px}
button{padding:10px;margin:5px;border:none;border-radius:6px;background:#ff8c00;color:#fff;width:100%}
input,textarea,select{width:100%;padding:8px;margin:5px 0}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:6px;text-align:center}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="header">📚 Jagannath Publishing Pro</div>

<div class="container">

<!-- LOGIN -->
<div class="card">
<button onclick="login()">🔐 Login with Google</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<!-- FORM -->
<div class="card">
<input id="title" placeholder="Title">
<input id="author" placeholder="Author">

<select id="status">
<option>Draft</option>
<option>Ready</option>
<option>Published</option>
</select>

<textarea id="description" placeholder="Description"></textarea>
<textarea id="editor" placeholder="Content"></textarea>

<button onclick="runAI()">🤖 AI Generate</button>
<button onclick="saveBook()">💾 Save Book</button>
<button onclick="copyKDP()">📤 Copy KDP</button>
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr><th>Title</th><th>Status</th><th>Action</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let books = [];

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout(){
  auth.signOut();
}

// SAVE
async function saveBook(){
  await db.collection("books").add({
    title:title.value,
    author:author.value,
    status:status.value,
    description:description.value,
    content:editor.value,
    created:Date.now()
  });
}

// LOAD
function loadBooks(){
  db.collection("books").onSnapshot(snap=>{
    books=[];
    snap.forEach(doc=>{
      books.push({...doc.data(),id:doc.id});
    });
    render();
  });
}

// RENDER
function render(){
  let html="";
  books.forEach(b=>{
    html+=`
    <tr>
      <td>${b.title}</td>
      <td>${b.status}</td>
      <td>
        <button onclick="del('${b.id}')">Delete</button>
      </td>
    </tr>`;
  });
  table.innerHTML=html;
}

// DELETE
function del(id){
  db.collection("books").doc(id).delete();
}

// AI (Basic)
function runAI(){
  let d=description.value;
  title.value=d.split(" ").slice(0,5).join(" ");
  editor.value="📘 "+title.value+"\n\n"+d;
}

// COPY KDP
function copyKDP(){
  let txt=`
Title: ${title.value}
Author: ${author.value}

Description:
${description.value}

Content:
${editor.value}
`;
  navigator.clipboard.writeText(txt);
  alert("Copied for KDP");
}

// INIT
auth.onAuthStateChanged(user=>{
  if(user){
    loadBooks();
  }
});

</script>

</body>
  </html>
